apiVersion: v1
kind: Namespace
metadata:
  name: kids-games
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: duck-game
  namespace: kids-games
spec:
  replicas: 1
  selector:
    matchLabels:
      app: duck-game
  template:
    metadata:
      labels:
        app: duck-game
    spec:
      containers:
      - name: duck-game
        image: mbeaudre/duckhunt:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: duck-game-service
  namespace: kids-games
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: duck-game
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: duck-game-ingress
  namespace: kids-games
spec:
  ingressClassName: nginx
  rules:
  - host: duck.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: duck-game-service
            port:
              number: 80
